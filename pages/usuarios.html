<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários | AnalyticsPro</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f8f9fe;
            --bg-secondary: #ffffff;
            --text-primary: #2d3436;
            --text-secondary: #636e72;
            --border-color: #e9ecef;
            --primary: #6C5CE7;
            --success: #00b894;
            --warning: #fdcb6e;
            --danger: #d63031;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .btn-back {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .btn-back:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateX(-4px);
        }

        .header-info {
            flex: 1;
        }

        .header-info h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .header-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6C5CE7, #a855f7);
            color: white;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
        }

        .btn-outline {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* barra de filtros */
        .filter-bar {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #b2bec3;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            background: var(--bg-primary);
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .filter-select {
            padding: 10px 16px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            background: var(--bg-primary);
            cursor: pointer;
            color: var(--text-primary);
            min-width: 150px;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* contador */
        .stats-mini {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .stat-mini {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px 20px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .stat-mini-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
        }

        .stat-mini-value {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .stat-mini-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* tabela */
        .table-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            padding: 16px 20px;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            background: var(--bg-primary);
            white-space: nowrap;
        }

        tbody td {
            padding: 14px 20px;
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        tbody tr {
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: var(--bg-primary);
        }

        .user-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .user-avatar-placeholder {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .user-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .user-email {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .badge-success {
            background: rgba(0, 184, 148, 0.1);
            color: #00b894;
        }

        .badge-warning {
            background: rgba(253, 203, 110, 0.1);
            color: #f39c12;
        }

        .badge-danger {
            background: rgba(214, 48, 49, 0.1);
            color: #d63031;
        }

        .badge-purple {
            background: rgba(108, 92, 231, 0.1);
            color: #6C5CE7;
        }

        .actions-cell {
            display: flex;
            gap: 6px;
        }

        .btn-icon-sm {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: var(--text-secondary);
        }

        .btn-icon-sm:hover {
            background: var(--bg-primary);
            color: var(--primary);
        }

        .btn-icon-sm.delete:hover {
            background: rgba(214, 48, 49, 0.1);
            color: #d63031;
        }

        /* paginação */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }

        .page-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            background: var(--bg-secondary);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
            color: var(--text-primary);
        }

        .page-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .page-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* modal simples */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 32px;
            max-width: 440px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(-20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal h3 {
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        .modal p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #00b894;
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            animation: slideInRight 0.3s ease;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-actions {
                width: 100%;
            }

            .header-actions .btn {
                flex: 1;
                justify-content: center;
            }

            .filter-bar {
                flex-direction: column;
            }

            .container {
                padding: 20px 16px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- cabeçalho -->
        <div class="header">
            <a href="../index.html" class="btn-back">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="header-info">
                <h1>Usuários</h1>
                <p>Gerencie todos os usuários da plataforma</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline" onclick="exportUsers()">
                    <i class="fas fa-download"></i> Exportar
                </button>
                <button class="btn btn-primary" onclick="openAddModal()">
                    <i class="fas fa-plus"></i> Novo Usuário
                </button>
            </div>
        </div>

        <!-- status -->
        <div class="stats-mini">
            <div class="stat-mini">
                <div class="stat-mini-icon" style="background: linear-gradient(135deg, #6C5CE7, #a855f7);">
                    <i class="fas fa-users"></i>
                </div>
                <div>
                    <div class="stat-mini-value">48</div>
                    <div class="stat-mini-label">Total</div>
                </div>
            </div>
            <div class="stat-mini">
                <div class="stat-mini-icon" style="background: linear-gradient(135deg, #00b894, #00CEC9);">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div>
                    <div class="stat-mini-value">42</div>
                    <div class="stat-mini-label">Ativos</div>
                </div>
            </div>
            <div class="stat-mini">
                <div class="stat-mini-icon" style="background: linear-gradient(135deg, #fdcb6e, #f39c12);">
                    <i class="fas fa-clock"></i>
                </div>
                <div>
                    <div class="stat-mini-value">4</div>
                    <div class="stat-mini-label">Pendentes</div>
                </div>
            </div>
            <div class="stat-mini">
                <div class="stat-mini-icon" style="background: linear-gradient(135deg, #d63031, #e17055);">
                    <i class="fas fa-ban"></i>
                </div>
                <div>
                    <div class="stat-mini-value">2</div>
                    <div class="stat-mini-label">Inativos</div>
                </div>
            </div>
        </div>

        <!-- filtros -->
        <div class="filter-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar por nome ou email..." oninput="filterUsers()">
            </div>
            <select class="filter-select" onchange="filterUsers()" id="statusFilter">
                <option value="all">Todos os Status</option>
                <option value="active">Ativos</option>
                <option value="pending">Pendentes</option>
                <option value="inactive">Inativos</option>
            </select>
            <select class="filter-select" onchange="filterUsers()" id="roleFilter">
                <option value="all">Todas as Funções</option>
                <option value="Admin">Admin</option>
                <option value="Editor">Editor</option>
                <option value="Usuário">Usuário</option>
            </select>
        </div>

        <!-- tabela -->
        <div class="table-card">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Usuário</th>
                            <th>Função</th>
                            <th>Status</th>
                            <th>Data de Cadastro</th>
                            <th>Último Acesso</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                    </tbody>
                </table>
            </div>
            <div class="pagination" id="pagination">
            </div>
        </div>
    </div>

    <!-- modal de adicionar/editar -->
    <div class="modal-overlay" id="userModal">
        <div class="modal">
            <h3 id="modalTitle">Novo Usuário</h3>
            <p>Preencha os dados do usuário</p>
            <form id="userForm" style="display: flex; flex-direction: column; gap: 16px;">
                <input type="hidden" id="editUserId">
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-weight: 600; font-size: 0.85rem;">Nome</label>
                    <input type="text" id="editName" class="search-box" style="width: 100%;" placeholder="Nome completo"
                        required>
                </div>
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-weight: 600; font-size: 0.85rem;">E-mail</label>
                    <input type="email" id="editEmail"
                        style="width: 100%; padding: 10px 16px; border: 2px solid var(--border-color); border-radius: 10px; font-family: 'Inter', sans-serif; background: var(--bg-primary);"
                        placeholder="email@exemplo.com" required>
                </div>
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-weight: 600; font-size: 0.85rem;">Função</label>
                    <select id="editRole" class="filter-select" style="width: 100%;">
                        <option value="Usuário">Usuário</option>
                        <option value="Editor">Editor</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- modal de confirmação -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <h3><i class="fas fa-exclamation-triangle" style="color: #fdcb6e;"></i> Confirmar Exclusão</h3>
            <p>Tem certeza que deseja excluir este usuário? Esta ação não pode ser desfeita.</p>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeDeleteModal()">Cancelar</button>
                <button class="btn btn-primary" style="background: #d63031;" id="confirmDeleteBtn">Excluir</button>
            </div>
        </div>
    </div>

    <script>
        // dados dos usuários
        const usersData = [
            { id: 1, name: 'João Silva', email: 'joao@email.com', role: 'Admin', status: 'active', avatar: 'https://i.pravatar.cc/150?img=1', createdAt: '10/01/2024', lastAccess: 'Hoje, 14:30' },
            { id: 2, name: 'Maria Santos', email: 'maria@email.com', role: 'Editor', status: 'active', avatar: 'https://i.pravatar.cc/150?img=5', createdAt: '15/01/2024', lastAccess: 'Hoje, 11:20' },
            { id: 3, name: 'Pedro Costa', email: 'pedro@email.com', role: 'Usuário', status: 'active', avatar: 'https://i.pravatar.cc/150?img=3', createdAt: '22/01/2024', lastAccess: 'Ontem, 16:45' },
            { id: 4, name: 'Ana Oliveira', email: 'ana@email.com', role: 'Editor', status: 'pending', avatar: 'https://i.pravatar.cc/150?img=9', createdAt: '28/01/2024', lastAccess: 'Nunca' },
            { id: 5, name: 'Lucas Ferreira', email: 'lucas@email.com', role: 'Usuário', status: 'active', avatar: 'https://i.pravatar.cc/150?img=4', createdAt: '02/02/2024', lastAccess: '02/02/2024' },
            { id: 6, name: 'Carla Lima', email: 'carla@email.com', role: 'Usuário', status: 'inactive', avatar: 'https://i.pravatar.cc/150?img=6', createdAt: '08/02/2024', lastAccess: '15/03/2024' },
            { id: 7, name: 'Rafael Souza', email: 'rafael@email.com', role: 'Admin', status: 'active', avatar: 'https://i.pravatar.cc/150?img=7', createdAt: '12/02/2024', lastAccess: 'Hoje, 09:15' },
            { id: 8, name: 'Juliana Martins', email: 'juliana@email.com', role: 'Usuário', status: 'pending', avatar: 'https://i.pravatar.cc/150?img=8', createdAt: '18/02/2024', lastAccess: 'Nunca' }
        ];

        let filteredUsers = [...usersData];
        let deleteUserId = null;

        // renderizar tabela
        function renderUsers(users) {
            const tbody = document.getElementById('usersTableBody');

            if (users.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 40px; color: var(--text-secondary);">
                            <i class="fas fa-users-slash" style="font-size: 2rem; display: block; margin-bottom: 8px; opacity: 0.3;"></i>
                            Nenhum usuário encontrado
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = users.map(user => {
                const statusBadge = {
                    'active': 'badge-success',
                    'pending': 'badge-warning',
                    'inactive': 'badge-danger'
                };

                const statusLabel = {
                    'active': 'Ativo',
                    'pending': 'Pendente',
                    'inactive': 'Inativo'
                };

                const roleBadge = user.role === 'Admin' ? 'badge-purple' : user.role === 'Editor' ? 'badge-warning' : 'badge-success';

                const initials = user.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                const avatarBg = user.avatar ? '' : `style="background: ${getColorFromName(user.name)}"`;

                return `
                    <tr>
                        <td>
                            <div class="user-cell">
                                ${user.avatar
                        ? `<img src="${user.avatar}" alt="${user.name}" class="user-avatar">`
                        : `<div class="user-avatar-placeholder" ${avatarBg}>${initials}</div>`
                    }
                                <div>
                                    <div class="user-name">${user.name}</div>
                                    <div class="user-email">${user.email}</div>
                                </div>
                            </div>
                        </td>
                        <td><span class="badge ${roleBadge}">${user.role}</span></td>
                        <td><span class="badge ${statusBadge[user.status]}">${statusLabel[user.status]}</span></td>
                        <td>${user.createdAt}</td>
                        <td>${user.lastAccess}</td>
                        <td>
                            <div class="actions-cell">
                                <button class="btn-icon-sm" title="Editar" onclick="editUser(${user.id})">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn-icon-sm delete" title="Excluir" onclick="confirmDelete(${user.id})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function getColorFromName(name) {
            const colors = ['#6C5CE7', '#00CEC9', '#fdcb6e', '#e17055', '#00b894', '#0984e3', '#e84393', '#f39c12'];
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        // filtrar usuários
        function filterUsers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            const roleFilter = document.getElementById('roleFilter').value;

            filteredUsers = usersData.filter(user => {
                const matchesSearch = user.name.toLowerCase().includes(searchTerm) ||
                    user.email.toLowerCase().includes(searchTerm);
                const matchesStatus = statusFilter === 'all' || user.status === statusFilter;
                const matchesRole = roleFilter === 'all' || user.role === roleFilter;

                return matchesSearch && matchesStatus && matchesRole;
            });

            renderUsers(filteredUsers);
        }

        // modal de adicionar
        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Novo Usuário';
            document.getElementById('editUserId').value = '';
            document.getElementById('editName').value = '';
            document.getElementById('editEmail').value = '';
            document.getElementById('editRole').value = 'Usuário';
            document.getElementById('userModal').classList.add('active');
        }

        // editar usuário
        function editUser(id) {
            const user = usersData.find(u => u.id === id);
            if (!user) return;

            document.getElementById('modalTitle').textContent = 'Editar Usuário';
            document.getElementById('editUserId').value = user.id;
            document.getElementById('editName').value = user.name;
            document.getElementById('editEmail').value = user.email;
            document.getElementById('editRole').value = user.role;
            document.getElementById('userModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('userModal').classList.remove('active');
        }

        // salvar usuário
        document.getElementById('userForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const id = document.getElementById('editUserId').value;
            const name = document.getElementById('editName').value.trim();
            const email = document.getElementById('editEmail').value.trim();
            const role = document.getElementById('editRole').value;

            if (!name || !email) {
                showToast('Preencha todos os campos!', 'error');
                return;
            }

            if (id) {
                // editar existente
                const user = usersData.find(u => u.id == id);
                if (user) {
                    user.name = name;
                    user.email = email;
                    user.role = role;
                }
                showToast('Usuário atualizado com sucesso! ✏️');
            } else {
                // adicionar novo
                const newUser = {
                    id: usersData.length + 1,
                    name,
                    email,
                    role,
                    status: 'active',
                    createdAt: new Date().toLocaleDateString('pt-BR'),
                    lastAccess: 'Nunca'
                };
                usersData.push(newUser);
                showToast('Usuário adicionado com sucesso! ✅');
            }

            closeModal();
            filterUsers();
        });

        // confirmar exclusão
        function confirmDelete(id) {
            deleteUserId = id;
            document.getElementById('deleteModal').classList.add('active');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('active');
            deleteUserId = null;
        }

        document.getElementById('confirmDeleteBtn').addEventListener('click', function () {
            if (deleteUserId) {
                const index = usersData.findIndex(u => u.id === deleteUserId);
                if (index > -1) {
                    usersData.splice(index, 1);
                    showToast('Usuário excluído com sucesso! 🗑️');
                }
                closeDeleteModal();
                filterUsers();
            }
        });

        // fechar modals com ESC
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                closeModal();
                closeDeleteModal();
            }
        });

        // exportar
        function exportUsers() {
            const csv = 'Nome,Email,Função,Status,Cadastro\n' +
                usersData.map(u => `${u.name},${u.email},${u.role},${u.status},${u.createdAt}`).join('\n');

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'usuarios.csv';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Lista exportada com sucesso!');
        }

        // toast
        function showToast(message, type = 'success') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = type === 'error' ? '#d63031' : '#00b894';
            toast.innerHTML = `<i class="fas fa-${type === 'error' ? 'times-circle' : 'check-circle'}"></i> ${message}`;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // inicializar
        renderUsers(usersData);
    </script>
</body>

</html>
